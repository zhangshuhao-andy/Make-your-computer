        section { height: 100vh; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; padding: 30px; }

        .control-hub {
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 50px; padding: 60px; width: 100%; max-width: 1200px;
            backdrop-filter: blur(80px); box-shadow: 0 0 150px rgba(0,0,0,0.8);

        .title-aura { text-align: center; margin-bottom: 60px; }
        .title-aura h1 { font-size: 4.5rem; font-weight: 950; letter-spacing: -5px; background: linear-gradient(135deg, #fff, var(--neon-link)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-cluster { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 50px; }
        .field label { font-size: 0.7rem; color: #556677; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 15px; }

        .ignite-trigger { width: 100%; padding: 30px; background: var(--neon-link); color: #000; border: none; border-radius: 25px; font-weight: 950; font-size: 1.8rem; cursor: pointer; letter-spacing: 10px; text-transform: uppercase; }
        .ignite-trigger:hover { filter: brightness(1.2); transform: scale(1.01); }

        /* 结果渲染矩阵 */
        .result-matrix { background: #000; border-left: 20px solid var(--neon-link); border-radius: 40px; padding: 70px; width: 100%; max-width: 1050px; display: none; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }

        .node-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 45px; border-top: 1px solid #111; padding-top: 45px; margin-top: 40px; }
        .node-item span { color: #444; font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 12px; }
        .node-item b { color: var(--neon-link); font-size: 1.2rem; }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        pts = []; for(let i=0; i<300; i++) pts.push({ x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 });
    }
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', init);

    function animate() {
        ctx.clearRect(0, 0, w, h);
        pts.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x<0 || p.x>w) p.vx*=-1; if(p.y<0 || p.y>h) p.vy*=-1;
            let dxm = p.x - mouse.x; let dym = p.y - mouse.y; let dm = Math.sqrt(dxm*dxm+dym*dym);
            if(dm < 150) {
                ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dm/150})`; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
            }
            for(let j=i+1; j<pts.length; j++) {
                let dx = p.x - pts[j].x; let dy = p.y - pts[j].y; let d = Math.sqrt(dx*dx+dy*dy);
                if(d < 100) {
                    ctx.strokeStyle = `rgba(0, 242, 255, ${0.3 - d/100})`; ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
                }
            }
            ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    init(); animate();

    function findBest(arr, targetPrice, filters = {}) {
        let valid = arr.filter(item => {
            for (let k in filters) { if (item[k] !== undefined && item[k] !== filters[k]) return false; }
            return true;
        });
        if(valid.length === 0 && filters.s) {
            let softFilters = {...filters}; delete softFilters.s;
            valid = arr.filter(item => {
                for (let k in softFilters) { if (item[k] !== undefined && item[k] !== softFilters[k]) return false; }
                return true;
            });
        }
        if(valid.length === 0) valid = arr; 
        valid.sort((a,b) => Math.abs(a.p - targetPrice) - Math.abs(b.p - targetPrice));
        return valid[0];
    }

    // 笔记本：寻找主推+两个备选
    function getTop3Laptops(arch, budget) {
        const db = generateLaptopDB();
        let valid = db.filter(x => x.a === arch);
        if(valid.length < 3) valid = db;
        
        // 过滤出预算内的机器，并按价格降序排列（越贵越接近预算）
        let affordable = valid.filter(x => x.p <= budget).sort((a,b) => b.p - a.p);
        
        // 如果预算内找不到3台，就拿所有机器里最便宜的顶上
        if(affordable.length < 3) {
            valid.sort((a,b) => a.p - b.p);
            return [valid[0], valid[1] || valid[0], valid[2] || valid[0]];
        }
        
        return [affordable[0], affordable[1], affordable[2]];
    }

            const W = USAGE_WEIGHTS[use] || USAGE_WEIGHTS.student;
            let cpu = findBest(DB.cpu, bud * W.c, {a: arch});
            let gpu = findBest(DB.gpu, bud * W.g);
            let mobo = findBest(DB.mobo, bud * W.m, {a: arch, s: style});
            let ram = findBest(DB.ram, bud * W.r, {s: style});
            let ssd = findBest(DB.ssd, bud * W.s);
            let caseObj = findBest(DB.case, bud * W.ca, {s: style});
            let cooler = findBest(DB.cooler, cool === 'custom' ? Math.max(3000, bud * 0.1) : bud * W.co, {c: cool, s: style});
            let psu = findBest(DB.psu, bud * W.p);

            let totalPrice = cpu.p + gpu.p + mobo.p + ram.p + ssd.p + caseObj.p + cooler.p + psu.p;

            cfg = {
                isLaptop: false,
                title: `Nexus 2026 Hyper-Custom Build [ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}]`,
                price: totalPrice,
                cpu: cpu.n,
                gpu: gpu.n,
                ram: ram.n,
                ssd: ssd.n,
                extra: `主板: ${mobo.n} | 机箱: ${caseObj.n} | 散热: ${cooler.n} | 电源: ${psu.n}`,
                totalComb: `基于 [${use.toUpperCase()}] 场景算力加权切分`
            };
        } else {
            const top3 = getTop3Laptops(arch, bud);
            const best = top3[0];
            cfg = {
                isLaptop: true,
                title: `🏆 重点推荐：${best.n}`,
                price: best.p,
                cpu: best.cpu,
                gpu: best.gpu,
                ram: best.ram,
                ssd: best.ssd,
                extra: "厂配整机 SKU，支持原厂三年联保",
                totalComb: "150+ 真实笔电SKU全库扫描",
                alt1: top3[1],
                alt2: top3[2]
            };
        }

        renderResult(cfg, use);
        document.getElementById('nexusScroller').scrollTo({ top: window.innerHeight, behavior: 'smooth' });
    }

        let altHtml = '';
        if (c.isLaptop) {

                    <div class="alt-item">
                        <div>🥈 <b>${c.alt1.n}</b> <br><small style="color:#556;">${c.alt1.cpu} / ${c.alt1.gpu} / ${c.alt1.ram}</small></div>

                    </div>
                    <div class="alt-item">
                        <div>🥉 <b>${c.alt2.n}</b> <br><small style="color:#556;">${c.alt2.cpu} / ${c.alt2.gpu} / ${c.alt2.ram}</small></div>
                        <span>¥${c.alt2.p.toLocaleString()}</span>

        }

        res.innerHTML = `
            <div style="color:var(--neon-link); letter-spacing:8px; font-weight:900; margin-bottom:20px;">[ ALGORITHM CALCULATION COMPLETE ]</div>
            <div style="font-size:1.2rem; color:#666;">配置矩阵状态: ${c.totalComb}</div>
            <div class="price-massive">¥${Math.floor(c.price).toLocaleString()}</div>
            <div style="font-size:1.8rem; color:var(--neon-link); margin-bottom:40px;">${c.title}</div>
            
            <div class="node-grid">
                <div class="node-item"><span>计算核心 (CPU)</span><b>${c.cpu}</b></div>
                <div class="node-item"><span>图形处理 (GPU)</span><b>${c.gpu}</b></div>
                <div class="node-item"><span>神经矩阵 (RAM)</span><b>${c.ram}</b></div>
                <div class="node-item"><span>持久层存储 (SSD)</span><b>${c.ssd}</b></div>
                <div class="node-item" style="grid-column: span 2;"><span>基础拓扑架构 (Base)</span><b>${c.extra}</b></div>
            </div>

            ${altHtml}

            <div class="ai-feedback">
                <h6>场景锁定动态反馈 [${u.toUpperCase()}]</h6>
                <p>${feedbacks[u]}</p>
            </div>
            <div style="margin-top:50px; text-align:right; font-size:0.6rem; color:#222; letter-spacing:5px;">NEXUS-2026-TITAN-DB</div>
        `;
        setTimeout(() => res.style.opacity = "1", 100);
    }
</script>
